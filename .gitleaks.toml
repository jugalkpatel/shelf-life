# Shelf Gitleaks configuration.
#
# Inherits the upstream ruleset and adds a narrow allowlist for files that
# intentionally contain realistic-looking-but-fake credentials: sample configs
# for the course baseline and test fixtures that need to look like real data
# for the scanner under test.

[extend]
useDefault = true

[allowlist]
description = "Shelf allowlist for baseline sample configs and test fixtures"
paths = [
  '''^sample-config\.json$''',
  '''^tests/fixtures/''',
  '''^playwright-report/''',
  '''^\.env\.example$'''
]
